# SPARK CONFIG!

# Reference Klipper docs for configs here! https://www.klipper3d.org/Config_Reference.html
# Reference SKR 1.4 pinout here! https://github.com/bigtreetech/BIGTREETECH-SKR-V1.3/blob/master/BTT%20SKR%20V1.4/Hardware/BTT%20SKR%20V1.4PIN.pdf

# mainsail stuff, if you use mainsailos just ignore this
[include mainsail.cfg]

########################################
###       OVERRIDES AND STUFFS       ###
########################################
# you should probably keep these commented out lol

[force_move]
enable_force_move: True

# [temperature_sensor bed_DIRECT]
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: P0.25 # TB
# min_temp: 0
# max_temp: 100

# [temperature_sensor extruder_DIRECT]
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: P0.24 # TH0
# min_temp: 0
# max_temp: 100

########################################
###     MAIN CONTROL AND OUTPUTS     ###
########################################

[stepper_x] # slot 0
step_pin: P2.2 # good
dir_pin: P2.6 # good
enable_pin: !P2.1 # good (TEST INVERT?)
microsteps: 16
rotation_distance: 40
endstop_pin: !P1.29
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y] # slot 1
step_pin: P0.19 # good
dir_pin: P0.20 # good
enable_pin: !P2.8 # good (TEST INVERT?)
microsteps: 16
rotation_distance: 40
endstop_pin: !P1.28
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z] # slot 2 and 3
step_pin: P0.22 # good
dir_pin: P2.11 # good
enable_pin: !P0.21 # good (TEST INVERT?)
microsteps: 16
rotation_distance: 8
endstop_pin: !P1.27
position_endstop: 0.0
position_max: 300 # something a bit more than 400?

[extruder] # slot 4
# gear_ratio: ??? TODO
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7 # correct
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24 # correct
control: pid
pid_Kp: 17.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260

#[extruder1] # NO SLOT 5!
#step_pin: P1.15
#dir_pin: P1.14
#enable_pin: !P1.16
#heater_pin: P2.4
#sensor_pin: P0.23
#...

[heater_bed]
heater_pin: P2.5 # good
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.25 # good
control: pid
pid_Kp: 58.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 70 # changed from 130 to 70

[fan]
pin: P2.3

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_1F20000FA498C895B8F13461C02000F5-if00

[printer]
# keep low speed for now
kinematics: corexy
max_velocity: 200 
max_accel: 300
max_z_velocity: 20
max_z_accel: 35

########################################
# EXP1 / EXP2 (display) pins
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=P1.30, EXP1_3=P1.18, EXP1_5=P1.20, EXP1_7=P1.22, EXP1_9=<GND>,
    EXP1_2=P0.28, EXP1_4=P1.19, EXP1_6=P1.21, EXP1_8=P1.23, EXP1_10=<5V>,
    # EXP2 header
    EXP2_1=P0.17, EXP2_3=P3.26, EXP2_5=P3.25, EXP2_7=P1.31, EXP2_9=<GND>,
    EXP2_2=P0.15, EXP2_4=P0.16, EXP2_6=P0.18, EXP2_8=<RST>, EXP2_10=<NC>
    # Pins EXP2_1, EXP2_6, EXP2_2 are also MISO, MOSI, SCK of bus "ssp0"

# See the sample-lcd.cfg file for definitions of common LCD displays.