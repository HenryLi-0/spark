# SPARK CONFIG!

# Reference Klipper docs for configs here! https://www.klipper3d.org/Config_Reference.html
# Reference SKR 1.4 pinout here! https://github.com/bigtreetech/BIGTREETECH-SKR-V1.3/blob/master/BTT%20SKR%20V1.4/Hardware/BTT%20SKR%20V1.4PIN.pdf

# mainsail stuff, if you use mainsailos just ignore this
[include mainsail.cfg]

########################################
###       OVERRIDES AND STUFFS       ###
########################################
# you should probably keep these commented out lol

[force_move]
enable_force_move: True

# THERE'S ALSO A MIN_EXTRUDE_TEMP IN EXTRUDER!!!

# [temperature_sensor bed_DIRECT]
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: P0.25 # TB
# min_temp: 0
# max_temp: 100

# [temperature_sensor extruder_DIRECT]
# sensor_type: EPCOS 100K B57560G104F
# sensor_pin: P0.24 # TH0
# min_temp: 0
# max_temp: 100

########################################
###     MAIN CONTROL AND OUTPUTS     ###
########################################

[stepper_x] # slot 0
step_pin: P2.2 # x port good
dir_pin: !P2.6 # x port good
enable_pin: !P2.1 # x port good
microsteps: 16
rotation_distance: 60
full_steps_per_rotation: 200
endstop_pin: P1.29
position_endstop: -50 # 0
position_min: -62 # -12
position_max: 140 # 190 (this is right before the docking bay parts)
homing_speed: 10

[stepper_y] # slot 1
step_pin: P0.19 # y port good
dir_pin: P0.20 # y port good
enable_pin: !P2.8 # y port good
microsteps: 16
rotation_distance: 60
full_steps_per_rotation: 200
endstop_pin: P1.28
position_endstop: -77.5 # 0
position_min: -77.5 # 0
position_max: 67.5 # 145
homing_speed: 10

[stepper_z] # slot 2 and 3
step_pin: P0.22 # z port good
dir_pin: !P2.11 # z port good
enable_pin: !P0.21 # z port good
microsteps: 16
rotation_distance: 2
full_steps_per_rotation: 200
endstop_pin: P1.27
position_endstop: 116.325
position_min: 0
position_max: 118 # more like 119 but safety
homing_speed: 4

[extruder] # slot 4, ref https://www.klipper3d.org/Config_Reference.html#extruder
gear_ratio: 28:14, 28:14
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
# rotation_distance: 29.645 # 0.943634cm * 10 * pi
# rotation_distance: 7.411 # JANK JANK JANK JANK JANK RAHHHHH
rotation_distance: 3.8 # even more jank :3 (why we tuning this lol) # 6.4 pre open sauce
nozzle_diameter: 0.400 # correct
filament_diameter: 1.750
# heater_pin: P2.7 # correct
# sensor_type: EPCOS 100K B57560G104F # correct
# sensor_pin: P0.24 # correct
heater_pin: P2.4 # correct
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.23 # correct
control: pid
pid_Kp: 24.326
pid_Ki: 1.192
pid_Kd: 124.061
min_temp: 0
max_temp: 260
# min_extrude_temp: 0 # COMMENT OUT WHEN NOT USING
# pressure_advance: 0.15 # maybe? idk, adds extra push to compensate for goofy extruder

